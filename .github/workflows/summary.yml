name: Summarize Issue

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

           - name: Get LLM Summary
        id: inference
        env:
          # 1. PASS UNTRUSTED INPUT THROUGH ENV VARIABLES
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 2. REFERENCE THEM SAFELY USING DOUBLE QUOTES
          echo "Read title: $ISSUE_TITLE"
          echo "Read body: $ISSUE_BODY"
          
          # Replace this mock output with your actual LLM API call
          # (Make sure to use "$ISSUE_TITLE" and "$ISSUE_BODY" when sending to your LLM API!)
          LLM_OUTPUT="This is a summary of the issue."
          
          # Use EOF to safely pass multiline LLM responses to GITHUB_OUTPUT
          echo "response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LLM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post Comment to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_RESPONSE: ${{ steps.inference.outputs.response }} 
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$LLM_RESPONSE"
