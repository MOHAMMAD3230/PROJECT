name: Summarize Issue

on:
  issues:
    types: [opened, edited] # Adjust this to match your current trigger

permissions:
  issues: write # Required to post the comment

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get LLM Summary
        id: inference
        run: |
          # ==========================================
          # REPLACE THIS SECTION with your actual LLM API call.
          # For example: calling OpenAI, Anthropic, or a local model.
          # ==========================================
          
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          
          # Mocking an API response for demonstration purposes
          LLM_OUTPUT="This is a summary of the issue. Even if the LLM accidentally outputs shell code like \$(whoami), it is safe now."
          
          # CRITICAL: Use EOF to safely pass multiline LLM responses to GITHUB_OUTPUT
          # If you don't use EOF, newlines in the LLM response will break the workflow
          echo "response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LLM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post Comment to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 1. THE FIX: Capture the untrusted output in an environment variable
          LLM_RESPONSE: ${{ steps.inference.outputs.response }} 
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 2. THE FIX: Reference it ONLY inside double quotes
          gh issue comment "$ISSUE_NUMBER" --body "$LLM_RESPONSE"
