name: Summarize Issue

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get LLM Summary
        id: inference
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          
          # Replace this mock output with your actual LLM API call
          LLM_OUTPUT="This is a summary of the issue. Even if the LLM accidentally outputs shell code like \$(whoami), it is safe now."
          
          # Use EOF to safely pass multiline LLM responses to GITHUB_OUTPUT
          echo "response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LLM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post Comment to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_RESPONSE: ${{ steps.inference.outputs.response }} 
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$LLM_RESPONSE"
